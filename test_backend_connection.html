<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backend Connection Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test { margin: 20px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background-color: #d4edda; }
        .error { background-color: #f8d7da; }
    </style>
</head>
<body>
    <h1>Backend Connection Test</h1>
    <div id="results"></div>

    <script>
        const API_BASE = 'http://127.0.0.1:8000/api/v1';
        const resultsDiv = document.getElementById('results');

        async function testConnection() {
            const tests = [
                { name: 'Backend root', url: 'http://127.0.0.1:8000/docs' },
                { name: 'API Health', url: `${API_BASE}/workflow/test-health` },
                { name: 'Mock thread state', url: `${API_BASE}/workflow/test-thread/state` }
            ];

            for (const test of tests) {
                try {
                    console.log(`Testing: ${test.name} -> ${test.url}`);
                    const response = await fetch(test.url);
                    const status = response.status;
                    const text = await response.text();
                    const className = response.ok ? 'success' : 'error';
                    const div = document.createElement('div');
                    div.className = `test ${className}`;
                    div.innerHTML = `<strong>${test.name}</strong><br>Status: ${status}<br>Response: ${text.substring(0, 200)}`;
                    resultsDiv.appendChild(div);
                } catch (err) {
                    const div = document.createElement('div');
                    div.className = 'test error';
                    div.innerHTML = `<strong>${test.name}</strong><br>Error: ${err.message}`;
                    resultsDiv.appendChild(div);
                }
            }
        }

        testConnection();
    </script>
</body>
</html>
