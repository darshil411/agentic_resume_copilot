<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Copilot - Command Center</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-50 text-black min-h-screen font-sans p-4 md:p-8">
    
    <header class="mb-8 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold text-navy">Command Center</h1>
            <p class="text-gray-500 text-sm mt-1" id="statusIndicator">Status: <span class="font-medium text-gray-700">Connecting...</span></p>
        </div>
        <button onclick="window.location.href='index.html'" class="text-navy hover:text-green font-medium text-sm transition-colors">
            &larr; Start New
        </button>
    </header>

    <!-- Bento Grid Container -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- 1. Resume Optimization Engine (Spans 2 cols on large screens) -->
        <section class="lg:col-span-2 bg-white rounded-xl shadow-custom-sm overflow-hidden flex flex-col h-[750px] relative border border-gray-100">
            <div class="p-4 border-b border-gray-100 bg-white flex justify-between items-center z-10">
                <h2 class="text-xl font-bold text-navy flex items-center gap-2">
                    <svg class="w-5 h-5 text-green" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    Optimization Engine
                </h2>
                <span id="resumeStateBadge" class="px-3 py-1 bg-gray-100 text-gray-600 rounded-full text-xs font-semibold uppercase tracking-wider">Processing</span>
            </div>
            
            <!-- Split View Container -->
            <div class="sync-scroll-container flex-col md:flex-row flex-1 relative bg-gray-50" id="resumeSyncContainer">
                
                <!-- Left: Original -->
                <div class="scroll-pane border-r border-gray-200 bg-white md:w-1/2 p-6" id="resumeOriginalPane">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4">Original Resume</h3>
                    <div id="resumeOriginalContent" class="prose prose-sm max-w-none text-black">
                        <div class="skeleton-shimmer h-4 w-3/4 mb-2 rounded"></div>
                        <div class="skeleton-shimmer h-4 w-full mb-2 rounded"></div>
                        <div class="skeleton-shimmer h-4 w-5/6 mb-4 rounded"></div>
                        
                        <div class="skeleton-shimmer h-4 w-2/3 mb-2 rounded"></div>
                        <div class="skeleton-shimmer h-4 w-full mb-2 rounded"></div>
                        <div class="skeleton-shimmer h-4 w-4/5 mb-2 rounded"></div>
                    </div>
                </div>

                <!-- Right: Optimized -->
                <div class="scroll-pane md:w-1/2 p-6 bg-white border-l-4 border-navy relative pb-24" id="resumeOptimizedPane">
                    <h3 class="text-xs font-bold text-navy uppercase tracking-wider mb-4 flex justify-between items-center">
                        Optimized Output
                        <button class="md:hidden text-green text-xs font-bold" onclick="document.getElementById('resumeOptimizedPane').scrollIntoView({behavior: 'smooth'})">Jump Here &darr;</button>
                    </h3>
                    <div id="currentSectionLabel" class="mb-4 text-sm font-bold text-green-600 uppercase tracking-wide">
                    Waiting for Optimization...
                    </div>
                    <div id="resumeOptimizedContent" class="prose prose-sm max-w-none text-black">
                        <div class="skeleton-shimmer h-4 w-3/4 mb-2 rounded"></div>
                        <div class="skeleton-shimmer h-4 w-full mb-2 rounded"></div>
                        <div class="skeleton-shimmer h-4 w-5/6 mb-4 rounded"></div>
                    </div>
                </div>
            </div>

            <!-- Sticky Footer for HITL Actions -->
            <div id="hitlControls" class="absolute bottom-0 right-0 w-full md:w-1/2 bg-white border-t border-gray-200 p-4 shadow-[0_-4px_12px_rgba(0,0,0,0.05)] transform translate-y-full transition-transform duration-300 flex flex-col gap-3 z-20">
                <textarea id="hitlFeedback" rows="2" class="w-full text-sm border border-gray-300 rounded p-2 focus:border-green focus:ring-1 focus:ring-green outline-none resize-none" placeholder="Add specific feedback or just approve..."></textarea>
                <div class="flex gap-2">
                    <button id="btnApprove" class="flex-1 bg-green hover:bg-green-600 text-white font-bold py-2 rounded transition-colors text-sm shadow-custom-sm">Approve</button>
                    <button id="btnRegenerate" class="flex-1 bg-white border border-navy text-navy hover:bg-gray-50 font-bold py-2 rounded transition-colors text-sm">Regenerate</button>
                </div>
            </div>
        </section>

        <!-- Right Column Stack -->
        <div class="flex flex-col gap-6">
            
            <!-- 2. Interview Prep Deck -->
            <section class="bg-white rounded-xl shadow-custom-sm overflow-hidden flex flex-col h-[360px] border border-gray-100">
                <div class="p-4 border-b border-gray-100 bg-white">
                    <h2 class="text-xl font-bold text-navy flex items-center gap-2">
                        <svg class="w-5 h-5 text-green" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                        Interview Deck
                    </h2>
                </div>
                <div class="p-6 flex-1 overflow-y-auto bg-gray-50 flex items-center justify-center relative perspective-1000" id="interviewDeckContainer">
                    <div class="text-center w-full">
                        <div class="skeleton-shimmer h-32 w-full max-w-sm mx-auto rounded-lg mb-2"></div>
                        <p class="text-xs text-gray-400">Generating questions...</p>
                    </div>
                </div>
                <!-- Deck Controls -->
                <div class="p-3 bg-white border-t border-gray-100 flex justify-between items-center hidden" id="interviewControls">
                    <button id="btnPrevCard" class="text-navy hover:text-green disabled:text-gray-300 font-medium text-sm">&larr; Prev</button>
                    <span id="cardCounter" class="text-xs font-bold text-gray-500">1 / 5</span>
                    <button id="btnNextCard" class="text-navy hover:text-green disabled:text-gray-300 font-medium text-sm">Next &rarr;</button>
                </div>
            </section>

            <!-- 3. Outreach Toolkit -->
            <section class="bg-white rounded-xl shadow-custom-sm overflow-hidden flex flex-col h-[366px] border border-gray-100">
                <div class="p-4 border-b border-gray-100 bg-white">
                    <h2 class="text-xl font-bold text-navy flex items-center gap-2">
                        <svg class="w-5 h-5 text-green" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        Outreach Toolkit
                    </h2>
                </div>
                <div class="p-4 flex-1 overflow-y-auto bg-gray-50" id="outreachContainer">
                    <div class="masonry-grid" id="outreachGrid">
                        <!-- Skeleton Cards -->
                        <div class="masonry-item bg-white p-4 rounded border border-gray-200">
                            <div class="skeleton-shimmer h-3 w-1/3 mb-3 rounded"></div>
                            <div class="skeleton-shimmer h-2 w-full mb-2 rounded"></div>
                            <div class="skeleton-shimmer h-2 w-5/6 mb-2 rounded"></div>
                            <div class="skeleton-shimmer h-2 w-4/5 rounded"></div>
                        </div>
                    </div>
                </div>
            </section>

        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container"></div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/ui_render.js"></script>
    <script src="js/workflow.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Synchronized scrolling for resume pane
            const pane1 = document.getElementById('resumeOriginalPane');
            const pane2 = document.getElementById('resumeOptimizedPane');

            let isSyncingLeft = false;
            let isSyncingRight = false;

            pane1.addEventListener('scroll', function(e) {
                if (!isSyncingLeft) {
                    isSyncingRight = true;
                    // Calculate percentage
                    const percentage = this.scrollTop / (this.scrollHeight - this.clientHeight);
                    pane2.scrollTop = percentage * (pane2.scrollHeight - pane2.clientHeight);
                }
                isSyncingLeft = false;
            });

            pane2.addEventListener('scroll', function(e) {
                if (!isSyncingRight) {
                    isSyncingLeft = true;
                    const percentage = this.scrollTop / (this.scrollHeight - this.clientHeight);
                    pane1.scrollTop = percentage * (pane1.scrollHeight - pane1.clientHeight);
                }
                isSyncingRight = false;
            });

            // Start workflow polling on load
            const threadId = localStorage.getItem('copilot_thread_id');
            if (!threadId) {
                showToast("No active session found. Redirecting to portal...", "error");
                setTimeout(() => window.location.href = 'index.html', 2000);
            } else {
                startPolling(threadId);
            }
        });
    </script>
</body>
</html>
